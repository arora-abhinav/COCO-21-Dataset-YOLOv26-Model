path: dataset
train: images/train
val: images/val

# Keypoints
kpt_shape: [21, 3] #Extra 4 for the left big toe, right big toe, left heel, right heel respectively
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15, 18, 17, 20, 19] #Flip idx tells the model to recognise keypoints when an image is horizontally flipped

names:
  0: person

# Keypoint names per class
kpt_names:
  0:
    - nose
    - left_eye
    - right_eye
    - left_ear
    - right_ear
    - left_shoulder
    - right_shoulder
    - left_elbow
    - right_elbow
    - left_wrist
    - right_wrist
    - left_hip
    - right_hip
    - left_knee
    - right_knee
    - left_ankle
    - right_ankle
    - left_big_toe
    - right_big_toe
    - left_heel
    - right_heel